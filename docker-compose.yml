services:
  redis:
    image: redis:7-alpine
    container_name: chatbot-redis
    restart: unless-stopped

  rq-worker:
    image: python:3.11-slim
    container_name: chatbot-rq-worker
    working_dir: /app/Chatbot_IA
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./:/app
      - uploads:/app/Chatbot_IA/local/uploads
    depends_on:
      - redis
    command: >
      bash -lc "apt-get update && apt-get install -y --no-install-recommends ffmpeg && rm -rf /var/lib/apt/lists/* && pip install --no-cache-dir -r requirements.txt && rq worker --url $$REDIS_URL"

  app:
    build:
      context: ..
      dockerfile: Chatbot_IA/Dockerfile
    container_name: chatbot-app
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8082:8082"
    depends_on:
      - redis
    command: []
    volumes:
      - uploads:/app/Chatbot_IA/local/uploads

volumes:
  uploads:
