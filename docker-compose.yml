services:
  redis:
    image: redis:7-alpine
    container_name: chatbot-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 900 1 --appendonly yes
    volumes:
      - redis_data:/data

  rq-worker:
    build:
      context: .
      dockerfile: Dockerfile.rq
    container_name: chatbot-rq-worker
    working_dir: /app/Chatbot_IA
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
      - RQ_WORKER_TTL=1800
      - RQ_JOB_TIMEOUT=300
    volumes:
      - ./:/app
      - uploads:/app/Chatbot_IA/local/uploads
    depends_on:
      - redis
    command: ["python", "worker_config.py"]

  app:
    build:
      context: ..
      dockerfile: Chatbot_IA/Dockerfile
    container_name: chatbot-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8082:8082"
    depends_on:
      - redis
    command: ["gunicorn","openIAService.main:app","--timeout","180","--workers","1","--threads","8","--bind","0.0.0.0:8082","--access-logfile","-","--error-logfile","-"]
    volumes:
      - uploads:/app/Chatbot_IA/local/uploads

volumes:
  uploads:
  redis_data:
