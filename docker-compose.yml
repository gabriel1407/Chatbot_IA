services:
  redis:
    image: redis:7-alpine
    container_name: chatbot-redis
    restart: unless-stopped

  rq-worker:
    build:
      context: ..
      dockerfile: Chatbot_IA/Dockerfile.rq
    container_name: chatbot-rq-worker
    working_dir: /app/Chatbot_IA
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./:/app
      - uploads:/app/Chatbot_IA/local/uploads
    depends_on:
      - redis
    command: ["bash", "-lc", "rq worker --url $$REDIS_URL"]

  app:
    build:
      context: ..
      dockerfile: Chatbot_IA/Dockerfile
    container_name: chatbot-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8082:8082"
    depends_on:
      - redis
    command: []
    volumes:
      - uploads:/app/Chatbot_IA/local/uploads

volumes:
  uploads:
